{{- if .Values.postgresql.enabled }}
# Secret consumed by the GlitchTip sub-chart via glitchtip.glitchtip.database.existingSecret
# and glitchtip.glitchtip.valkey.existingSecret.
# Must be created before the GlitchTip Deployment and the init Job (both reference it).
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-creds
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Release.Name .Values.postgresql.auth.database | quote }}
  REDIS_URL: {{ printf "redis://%s-valkey-primary:6379" .Release.Name | quote }}
{{- end }}
